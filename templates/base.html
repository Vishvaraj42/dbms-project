<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>University Course Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f6fa; }
    nav { background-color: #0d6efd; }
    nav a { color: white !important; margin-right: 15px; font-weight: 500; }
    footer { margin-top: 30px; text-align: center; color: gray; }
  </style>
</head>
<!-- Delete Confirmation Modal -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title" id="confirmDeleteLabel">Delete Record</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>⚠️ Are you sure you want to delete this record? This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <a id="confirmDeleteBtn" href="#" class="btn btn-danger">Delete</a>
      </div>
    </div>
  </div>
</div>

<!-- JavaScript for Delete Modal -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const deleteModal = document.getElementById('confirmDeleteModal');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

    deleteModal.addEventListener('show.bs.modal', function (event) {
      const triggerButton = event.relatedTarget;
      const deleteUrl = triggerButton.getAttribute('data-delete-url');
      confirmDeleteBtn.setAttribute('href', deleteUrl);
    });
  });
</script>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark px-3">
    <a class="navbar-brand" href="/">🎓 UCMS</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/students">Students</a>
      <a class="nav-link" href="/courses">Courses</a>
      <a class="nav-item"><a class="nav-link" href="/prerequisites">Prerequisites</a>
      <a class="nav-link" href="/faculty">Faculty</a>
      <a class="nav-link" href="/departments">Departments</a>
      <a class="nav-link" href="/classrooms">Classrooms</a>
      <a class="nav-link" href="/enrollments">Enrollments</a>
      <a class="nav-link" href="/attendance">Attendance</a>
      <li class="nav-item">
  <a class="nav-link" href="/attendance_report">Report</a>
  <form action="{{ url_for('search') }}" method="get" class="d-flex" style="margin-left: auto;">
  <input class="form-control me-2" type="search" name="q" placeholder="Search..." aria-label="Search">
  <button class="btn btn-outline-light" type="submit">Search</button>
</form>

</li>

    </div>
  </nav>

  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>

  <footer>
    <p>University Course Management System © 2025</p>
  </footer>
  <!-- Bootstrap Bundle (includes Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Optional Tooltip Activation (for hover titles) -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const tooltipTriggerList = document.querySelectorAll('[title]');
    tooltipTriggerList.forEach(el => new bootstrap.Tooltip(el));
  });
</script>

</body>
</html>
