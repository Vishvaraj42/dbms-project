{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">Courses</h2>

<form method="POST" action="/courses" class="row g-3 mb-4"><!-- or url_for('course_bp.courses') if using blueprint -->
  <div class="col-md-4">
    <input type="text" name="title" class="form-control" placeholder="Course Title" required>
  </div>

  <div class="col-md-2">
    <input type="number" name="credits" class="form-control" placeholder="Credits" min="1" required>
  </div>

  <div class="col-md-3">
    <select name="dept_id" class="form-select" required>
      <option value="">Select Department</option>
      {% for d in departments %}
        <option value="{{ d.dept_id }}">{{ d.dept_name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="col-md-3">
    <select name="prereq_id" class="form-select">
      <option value="">No Prerequisite</option>
      {% for c in all_courses %}
        <option value="{{ c.course_id }}">{{ c.title }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="col-12 text-end">
    <button type="submit" class="btn btn-success">Add Course</button>
  </div>
</form>

<table class="table table-striped table-hover">
  <thead class="table-dark">
    <tr><th>ID</th><th>Title</th><th>Credits</th><th>Department</th><th>Prerequisite</th></tr>
  </thead>
  <tbody>
    {% for c in courses %}
    <tr>
      <td>{{ c.course_id }}</td>
      <td>{{ c.title }}</td>
      <td>{{ c.credits }}</td>
      <td>{{ c.dept_name or 'None' }}</td>
      <td>{{ c.prereq_title or 'None' }}</td>
      <td>
<a href="#" class="btn btn-danger btn-sm"
   data-bs-toggle="modal"
   data-bs-target="#confirmDeleteModal"
   data-delete-url="/delete_course/{{ c.course_id }}"
   title="Delete Course">
   🗑 Delete
</a>


      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
