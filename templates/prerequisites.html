{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">Course Prerequisites</h2>

<form method="POST" action="/prerequisites" class="row g-3 mb-4">
  <div class="col-md-5">
    <select name="course_id" class="form-select" required>
      <option value="">Select Course</option>
      {% for c in courses %}
      <option value="{{ c.course_id }}">{{ c.title }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="col-md-5">
    <select name="prereq_course_id" class="form-select" required>
      <option value="">Select Prerequisite Course</option>
      {% for c in courses %}
      <option value="{{ c.course_id }}">{{ c.title }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="col-md-2 text-end">
    <button type="submit" class="btn btn-success">Add</button>
  </div>
</form>

<table class="table table-striped table-hover">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Course</th>
      <th>Prerequisite</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for p in prerequisites %}
    <tr>
      <td>{{ p.prereq_id }}</td>
      <td>{{ p.course }}</td>
      <td>{{ p.prerequisite }}</td>
      <td>
        <a href="#" class="btn btn-danger btn-sm"
   data-bs-toggle="modal"
   data-bs-target="#confirmDeleteModal"
   data-delete-url="/delete_prerequisite/{{ p.prereq_id }}"
   title="Delete Prerequisite">
   🗑 Delete
</a>

      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
