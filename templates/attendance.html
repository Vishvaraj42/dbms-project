{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">Attendance</h2>

<form method="POST" action="/attendance" class="row g-3 mb-4">
  <div class="col-md-5">
    <select name="enrollment_id" class="form-select" required>
      <option value="">Select Student - Course</option>
      {% for e in enrollments %}
      <option value="{{ e.enrollment_id }}">{{ e.student_course }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-3">
    <input type="date" name="attendance_date" class="form-control" required>
  </div>
  <div class="col-md-3">
    <select name="status" class="form-select" required>
      <option value="">Select Status</option>
      <option>Present</option>
      <option>Absent</option>
    </select>
  </div>
  <div class="col-md-1 text-end">
    <button type="submit" class="btn btn-success">Add</button>
  </div>
</form>

<table class="table table-striped table-hover">
  <thead class="table-dark">
    <tr><th>ID</th><th>Student</th><th>Course</th><th>Date</th><th>Status</th></tr>
  </thead>
  <tbody>
    {% for a in attendance %}
    <tr>
      <td>{{ a.attendance_id }}</td>
      <td>{{ a.student_name }}</td>
      <td>{{ a.course_title }}</td>
      <td>{{ a.attendance_date }}</td>
      <td>{{ a.status }}</td>
      <td>
        <a href="#" class="btn btn-danger btn-sm"
   data-bs-toggle="modal"
   data-bs-target="#confirmDeleteModal"
   data-delete-url="/delete_attendance/{{ a.attendance_id }}"
   title="Delete Attendance Record">
   🗑 Delete
</a>

      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
