{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">Departments</h2>

<form method="POST" action="/departments" class="row g-3 mb-4">
  <div class="col-md-6">
    <input type="text" name="dept_name" class="form-control" placeholder="Department Name" required>
  </div>
  <div class="col-md-4">
    <select name="building" class="form-select">
      <option value="">Select Building</option>
      <option>Block - A</option>
      <option>Block - B</option>
      <option>Block - C</option>
      <option>Block - D</option>
      <option>Block - E</option>
      <option>Block - F</option>
    </select>
  </div>
  <div class="col-md-2 text-end">
    <button type="submit" class="btn btn-success">Add Department</button>
  </div>
</form>

<table class="table table-striped table-hover">
  <thead class="table-dark">
    <tr><th>ID</th><th>Department</th><th>Building</th></tr>
  </thead>
  <tbody>
    {% for d in departments %}
    <tr>
      <td>{{ d.dept_id }}</td>
      <td>{{ d.dept_name }}</td>
      <td>{{ d.building or "N/A" }}</td>
      <td>
        <a href="#" class="btn btn-danger btn-sm"
   data-bs-toggle="modal"
   data-bs-target="#confirmDeleteModal"
   data-delete-url="/delete_department/{{ d.dept_id }}"
   title="Delete Department">
   🗑 Delete
</a>

      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
